<div class="modal-overlay" *ngIf="isVisible" (click)="onOverlayClick($event)">
  <div class="modal-container">
    <div class="modal-header">
      <h2 class="modal-title">📊 Filtros de Relatório</h2>
      <button class="close-button" (click)="closeModalHandler()" aria-label="Fechar modal" type="button">✕</button>
    </div>

    <div class="modal-body">
      <form [formGroup]="filterForm" (ngSubmit)="gerarRelatorio()">

        <!-- PERÍODO -->
        <p class="section-label">Período *</p>
        <div class="form-row">
          <div class="form-group">
            <label for="dataInicio">Data Início</label>
            <input type="date" id="dataInicio" formControlName="dataInicio" class="form-control"
              [class.is-invalid]="hasFieldError('dataInicio')">
            <div *ngIf="hasFieldError('dataInicio')" class="invalid-feedback">{{ getFieldError('dataInicio') }}</div>
          </div>
          <div class="form-group">
            <label for="dataFim">Data Fim</label>
            <input type="date" id="dataFim" formControlName="dataFim" class="form-control"
              [class.is-invalid]="hasFieldError('dataFim')">
            <div *ngIf="hasFieldError('dataFim')" class="invalid-feedback">{{ getFieldError('dataFim') }}</div>
          </div>
        </div>

        <!-- STATUS + PRIORIDADE -->
        <p class="section-label">Status e Prioridade</p>
        <div class="form-row">
          <div class="form-group">
            <label for="status">Status</label>
            <select id="status" formControlName="status" class="form-control">
              <option value="">Todos</option>
              <option value="aberto">Aberto</option>
              <option value="em andamento">Em Andamento</option>
              <option value="concluido">Concluído</option>
              <option value="encerrado">Encerrado</option>
            </select>
          </div>
          <div class="form-group">
            <label for="prioridade">Prioridade</label>
            <select id="prioridade" formControlName="prioridade" class="form-control">
              <option value="">Todas</option>
              <option value="baixa">Baixa</option>
              <option value="media">Média</option>
              <option value="alta">Alta</option>
              <option value="urgente">Urgente</option>
            </select>
          </div>
        </div>

        <!-- ÁREA + ORIGEM -->
        <p class="section-label">Área e Origem</p>
        <div class="form-row">
          <div class="form-group">
            <label for="area">Área / Departamento</label>
            <select id="area" formControlName="area" class="form-control">
              <option value="">Todas</option>
              <option *ngFor="let a of areas" [value]="a">{{ a }}</option>
            </select>
          </div>
          <div class="form-group">
            <label for="origem">Origem</label>
            <select id="origem" formControlName="origem" class="form-control">
              <option value="">Todas</option>
              <option value="whatsapp">📱 WhatsApp</option>
              <option value="email">📧 E-mail</option>
            </select>
          </div>
        </div>

        <!-- ATENDENTE + CLIENTE -->
        <p class="section-label">Atendente e Cliente</p>
        <div class="form-row">
          <div class="form-group">
            <label for="atendente">Atendente</label>
            <select id="atendente" formControlName="atendente" class="form-control"
              *ngIf="listaAtendentes.length > 0; else atendenteTexto">
              <option value="">Todos</option>
              <option *ngFor="let u of listaAtendentes" [value]="u.id">{{ u.nome }}</option>
            </select>
            <ng-template #atendenteTexto>
              <input type="text" id="atendenteTexto" formControlName="atendente" class="form-control"
                placeholder="Nome do atendente">
            </ng-template>
          </div>
          <div class="form-group">
            <label for="cliente">Cliente</label>
            <input type="text" id="cliente" formControlName="cliente" class="form-control"
              placeholder="Nome ou parte do nome">
          </div>
        </div>

        <!-- ACTIONS CLEAR -->
        <div class="filter-actions">
          <button type="button" class="btn-clear-optional" (click)="limparFiltrosOpcionais()"
            title="Limpar apenas filtros opcionais">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 6h18"/>
              <path d="M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
              <path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6"/>
            </svg>
            Limpar Opcionais
          </button>
          <button type="button" class="btn-clear-all" (click)="limparTodosFiltros()" title="Limpar todos os filtros">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 6h18"/>
              <path d="M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
              <path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6"/>
              <line x1="10" y1="11" x2="10" y2="17"/>
              <line x1="14" y1="11" x2="14" y2="17"/>
            </svg>
            Limpar Tudo
          </button>
        </div>

        <!-- FOOTER -->
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" (click)="closeModalHandler()">Cancelar</button>
          <button type="submit" class="btn btn-primary" [disabled]="filterForm.invalid">
            📊 Gerar Relatório
          </button>
        </div>

      </form>
    </div>
  </div>
</div>
